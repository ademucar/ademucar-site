    <style>
        /* EKRAMA SIĞMASI İÇİN BOŞLUKLAR DARALTILDI */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            padding-bottom: 20px;
            animation: fadeIn 0.8s ease-out;
            color: #f8fafc;
        }

        .game-title {
            font-size: 2rem;
            font-weight: 800;
            color: #f8fafc;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        /* --- KÜÇÜLTÜLMÜŞ SKOR TABLOSU --- */
        .score-board {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .score-box {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            padding: 6px 20px;
            text-align: center;
            min-width: 100px;
        }

        .score-title {
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .score-value {
            color: #38bdf8;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.85rem;
        }

        /* --- BAYRAK CONTAINER (ORANTILI KÜÇÜLTÜLDÜ) --- */
        .flag-container {
            width: 285px;
            height: 190px;
            position: relative;
            border: 2px solid rgba(56, 189, 248, 0.5);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            background-color: #0f172a;
        }

        .flag-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .flag-grid {
            position: absolute;
            top: -1px; left: -1px;
            width: calc(100% + 2px);
            height: calc(100% + 2px);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            z-index: 2;
        }

        .flag-piece {
            background-color: #1e293b;
            box-shadow: inset 0 0 0 1px #0f172a;
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
        }

        .flag-piece.revealed {
            background-color: transparent;
            box-shadow: none;
        }

        /* ARAMA VE AUTOCOMPLETE */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .neon-input {
            flex-grow: 1;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .neon-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
            background: rgba(15, 23, 42, 1);
        }

        .btn-guess {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
        }

        .btn-guess:hover {
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            transform: translateY(-2px);
        }

        .btn-guess:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .autocomplete-list {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: #1e293b;
            border: 1px solid #38bdf8;
            border-top: none;
            border-radius: 0 0 6px 6px;
            z-index: 100;
            max-height: 180px;
            overflow-y: auto;
            display: none;
        }

        .autocomplete-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #334155;
            color: #f8fafc;
            font-size: 0.9rem;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
        }

        /* SONUÇLAR - DAHA KOMPAKT YAPI */
        .results-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .result-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 8px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #475569;
            padding: 8px 12px;
            border-radius: 6px;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .result-name { font-weight: 600; font-size: 0.9rem; }
        .result-dist { color: #cbd5e1; font-size: 0.85rem; white-space: nowrap; }

        .result-dir {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .result-dir .dir-arrow {
            display: inline-block;
        }

        .result-row.win {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .result-row.win .result-dir {
            background: #10b981;
            color: #fff;
        }

        .game-over-msg {
            margin-top: 10px;
            font-size: 1.1rem;
            font-weight: 800;
            text-align: center;
            display: none;
        }

        .btn-restart {
            margin-top: 10px;
            background: #f59e0b;
            color: #0f172a;
            display: none;
            padding: 10px 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

        function normalizeTR(str) {
            return str
                .toLocaleLowerCase('tr-TR')
                .replace(/ğ/g, 'g')
                .replace(/ü/g, 'u')
                .replace(/ş/g, 's')
                .replace(/ı/g, 'i')
                .replace(/ö/g, 'o')
                .replace(/ç/g, 'c');
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = deg2rad(lat1), l2 = deg2rad(lat2);
            const dLon = deg2rad(lon2 - lon1);
            const y = Math.sin(dLon) * Math.cos(l2);
            const x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dLon);
            return Math.round((Math.atan2(y, x) * 180 / Math.PI + 360) % 360);
        }

        function initGame() {
            targetCountry = countries[Math.floor(Math.random() * countries.length)];
            guesses = 0;
            resultsEl.innerHTML = '';
            inputEl.value = '';
            inputEl.disabled = false;
            document.getElementById('btnGuess').disabled = false;
            document.getElementById('gameOverMsg').style.display = 'none';
            document.getElementById('btnRestart').style.display = 'none';
            listEl.style.display = 'none';

            updateScoreUI();

            // Izgaraları ANINDA (animasyonsuz) kapat — böylece yeni bayrak bir an görünüp kaybolmaz
            for (let i = 0; i < 6; i++) {
                const p = document.getElementById(`p-${i}`);
                p.style.transition = 'none';
                p.classList.remove('revealed');
            }
            // Değişikliğin animasyonsuz uygulanması için reflow'u zorla
            void document.getElementById('flagGrid').offsetWidth;

            // Yeni bayrağı kapalı ızgaranın altına yerleştir
            flagBg.style.backgroundImage = `url('https://flagcdn.com/w320/${targetCountry.code}.png')`;

            // Transition'ı geri ver: tahmin sırasında parça açılışları yumuşak olsun
            requestAnimationFrame(() => {
                for (let i = 0; i < 6; i++) {
                    document.getElementById(`p-${i}`).style.transition = '';
                }
            });

            pieceOrder = [0, 1, 2, 3, 4, 5].sort(() => Math.random() - 0.5);
        }

        inputEl.addEventListener('input', function () {
            const val = normalizeTR(this.value.trim());
            listEl.innerHTML = '';

            if (!val) {
                listEl.style.display = 'none';
                return;
            }

            const starts = countries.filter(c => normalizeTR(c.name).startsWith(val));
            const includes = countries.filter(c =>
                !normalizeTR(c.name).startsWith(val) && normalizeTR(c.name).includes(val)
            );
            const matches = [...starts, ...includes].slice(0, 8);

            if (matches.length > 0) {
                listEl.style.display = 'block';
                matches.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-item';
                    div.innerText = match.name;
                    div.addEventListener('mousedown', function (e) {
                        e.preventDefault();
                        inputEl.value = match.name;
                        listEl.style.display = 'none';
                    });
                    listEl.appendChild(div);
                });
            } else {
                listEl.style.display = 'none';
            }
        });

        document.addEventListener('click', (e) => {
            if (e.target !== inputEl && e.target !== listEl) {
                listEl.style.display = 'none';
            }
        });

        inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') submitGuess();
        });

        function submitGuess() {
            const guessName = inputEl.value.trim().toLocaleLowerCase('tr-TR');
            const guessedObj = countries.find(c =>
                c.name.toLocaleLowerCase('tr-TR') === guessName
            );

            if (!guessedObj) {
                alert("Lütfen listeden geçerli bir ülke seçin!");
                return;
            }

            listEl.style.display = 'none';
            inputEl.value = '';

            const distance = getDistance(guessedObj.lat, guessedObj.lon, targetCountry.lat, targetCountry.lon);
            const bearing = getBearing(guessedObj.lat, guessedObj.lon, targetCountry.lat, targetCountry.lon);

            const row = document.createElement('div');
            row.className = 'result-row';

            if (guessedObj.name === targetCountry.name) {
                row.classList.add('win');
                row.innerHTML = `
                    <div class="result-name">${guessedObj.name}</div>
                    <div class="result-dist">0 km</div>
                    <div class="result-dir"><i class="fas fa-check"></i></div>
                `;
                resultsEl.prepend(row);
                endGame(true);
            } else {
                row.innerHTML = `
                    <div class="result-name">${guessedObj.name}</div>
                    <div class="result-dist">${distance.toLocaleString('tr-TR')} km</div>
                    <div class="result-dir">
                        <span class="dir-arrow" style="display:inline-block; transform: rotate(${bearing}deg)">
                            <i class="fas fa-arrow-up"></i>
                        </span>
                    </div>
                `;
                resultsEl.prepend(row);

                document.getElementById(`p-${pieceOrder[guesses]}`).classList.add('revealed');
                guesses++;

                if (guesses >= maxGuesses) endGame(false);
            }
        }

        function endGame(win) {
            inputEl.disabled = true;
            document.getElementById('btnGuess').disabled = true;

            for (let i = 0; i < 6; i++) {
                document.getElementById(`p-${i}`).classList.add('revealed');
            }

            const msgEl = document.getElementById('gameOverMsg');
            msgEl.style.display = 'block';

            if (win) {
                const pointsArray = [100, 80, 60, 40, 20, 10];
                const pointsEarned = pointsArray[guesses];
                
                totalScore += pointsEarned;
                if (totalScore > bestScore) {
                    bestScore = totalScore;
                    localStorage.setItem('flagleBestScore', bestScore);
                }
                
                msgEl.style.color = '#10b981';
                msgEl.innerText = `Tebrikler! ${guesses + 1}. denemede buldun. (+${pointsEarned} Puan) 🎉`;
            } else {
                totalScore = 0;
                msgEl.style.color = '#ef4444';
                msgEl.innerText = `Maalesef bilemedin! Doğru cevap: ${targetCountry.name}`;
            }

            localStorage.setItem('flagleTotalScore', totalScore);
            updateScoreUI();

            document.getElementById('btnRestart').style.display = 'inline-block';
        }

        initGame();
    </script>
</body>
