    <style>
    .content-container {
        max-width: 520px;
        max-height: 92vh;
        overflow: hidden !important;
        padding: 28px 30px !important;
    }

    .game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-top: 4px;
    }

    /* Skor paneli */
    .score-panel {
        display: flex;
        gap: 10px;
        width: 340px;
        max-width: 100%;
    }

    .score-box {
        flex: 1;
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(56, 189, 248, 0.2);
        border-radius: 10px;
        padding: 8px 12px;
        text-align: center;
    }

    .score-box-label {
        font-size: 0.68rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
    }

    .score-box-value {
        font-size: 1.45rem;
        font-weight: 800;
        color: #38bdf8;
        line-height: 1.1;
    }

    /* Canvas */
    #gameCanvas {
        background-color: rgba(10, 18, 35, 0.97);
        border: 1px solid rgba(56, 189, 248, 0.25);
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.04);
        display: block;
        width: 340px;
        height: 340px;
        max-width: 100%;
        outline: none;
        touch-action: none;
        cursor: pointer;
    }

    /* D-pad */
    .dpad {
        display: grid;
        grid-template-columns: repeat(3, 40px);
        grid-template-rows: repeat(2, 40px);
        gap: 5px;
    }

    .dpad-btn {
        width: 40px;
        height: 40px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(56, 189, 248, 0.25);
        border-radius: 8px;
        color: #38bdf8;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.1s, transform 0.1s;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
    }

    .dpad-btn:active {
        background: rgba(56, 189, 248, 0.15);
        transform: scale(0.93);
    }

    .dpad-empty {
        width: 40px;
        height: 40px;
    }

    .btn-restart {
        padding: 9px 22px;
        background: #38bdf8;
        color: #0f172a;
        border: none;
        border-radius: 8px;
        font-weight: 800;
        font-size: 0.82rem;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        display: none;
    }

    .btn-restart:hover {
        background: #7dd3fc;
    }

    .btn-restart:active {
        transform: scale(0.97);
    }

    .game-hint {
        font-size: 0.72rem;
        color: #475569;
        text-align: center;
    }

    .page-title {
        margin-bottom: 4px !important;
    }
</style>
</head>
<body>

        <header class="top-header">
            <nav class="nav-menu">

                <div class="dropdown">

            <div class="social-icons">

                <a href="https://github.com/ademucar" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://medium.com/@ademucarr" target="_blank" aria-label="Medium" style="font-family: Georgia, 'Times New Roman', serif; font-weight: bold; font-size: 1.15em; line-height: 1; text-decoration: none; display: inline-block; transform: translateY(2px);">M</a>
            </div>
        </header>

        <div class="content-container">
            <h1 class="page-title" style="margin-bottom: 8px;">Neon Snake</h1>

            <div class="game-wrapper">

                <!-- Skor paneli -->
                <div class="score-panel">
                    <div class="score-box">
                        <div class="score-box-label">Skor</div>
                        <div class="score-box-value" id="score">0</div>
                    </div>
                    <div class="score-box">
                        <div class="score-box-label">En İyi</div>
                        <div class="score-box-value" id="bestScore">0</div>
                    </div>
                </div>

                <!-- Canvas -->
                <canvas id="gameCanvas" width="400" height="400" tabindex="0"></canvas>

                <!-- Restart butonu -->
                <button class="btn-restart" id="restartBtn" onclick="resetGame()">
                    <i class="fas fa-redo" style="margin-right:6px;"></i>Yeniden Oyna
                </button>

                <!-- D-pad (mobil) -->
                <div class="dpad">
                    <div class="dpad-empty"></div>
                    <button class="dpad-btn" onclick="pressDir(38)">&#9650;</button>
                    <div class="dpad-empty"></div>
                    <button class="dpad-btn" onclick="pressDir(37)">&#9664;</button>
                    <button class="dpad-btn" onclick="pressDir(40)">&#9660;</button>
                    <button class="dpad-btn" onclick="pressDir(39)">&#9654;</button>
                </div>

                <p class="game-hint">
                    <i class="fas fa-keyboard"></i> Yön tuşları &nbsp;·&nbsp;
                    <i class="fas fa-hand-pointer"></i> D-pad &nbsp;·&nbsp;
                    <i class="fas fa-mobile-alt"></i> Swipe
                </p>

            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const bestEl = document.getElementById("bestScore");
        const restartBtn = document.getElementById("restartBtn");

        const COLS = 20, ROWS = 20, BOX = 20;

        let snake, dir, nextDir, food, score, best, gameInterval, isRunning, isOver;

        // ── İlk yükleme ──────────────────────────────────────────────
        window.onload = () => {
            best = 0;
            initGame();
            canvas.focus();
        };

        // ── Oyunu sıfırla / başlat ───────────────────────────────────
        function initGame() {
            clearInterval(gameInterval);
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
            dir    = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0;
            isRunning = false;   // İlk yön tuşuna basınca başlar
            isOver = false;
            scoreEl.textContent = 0;
            restartBtn.style.display = "none";
            placeFood();
            render();
            drawOverlay("Başlamak için yön tuşuna bas", "veya d-pad butonlarına dokun");
        }

        function resetGame() {
            initGame();
            canvas.focus();
        }

        // ── Besin yerleştir ──────────────────────────────────────────
        function placeFood() {
            let f;
            do {
                f = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
            } while (snake.some(s => s.x === f.x && s.y === f.y));
            food = f;
        }

        // ── Yön değiştir ─────────────────────────────────────────────
        function changeDir(dx, dy) {
            // Zıt yöne gitmeyi engelle
            if (dx !== 0 && dir.x === -dx) return;
            if (dy !== 0 && dir.y === -dy) return;
            // Aynı eksen üzerinde çift komut engelle
            if (dx !== 0 && dir.x !== 0) return;
            if (dy !== 0 && dir.y !== 0) return;
            nextDir = { x: dx, y: dy };
            if (!isRunning && !isOver) {
                isRunning = true;
                gameInterval = setInterval(step, 130);
            }
        }

        // ── Klavye ───────────────────────────────────────────────────
        document.addEventListener("keydown", (e) => {
            if ([37, 38, 39, 40, 32].includes(e.keyCode)) e.preventDefault();
            if (e.keyCode === 37) changeDir(-1, 0);
            else if (e.keyCode === 38) changeDir(0, -1);
            else if (e.keyCode === 39) changeDir(1, 0);
            else if (e.keyCode === 40) changeDir(0, 1);
        });

        // ── D-pad butonları ──────────────────────────────────────────
        function pressDir(keyCode) {
            const map = { 37: [-1,0], 38: [0,-1], 39: [1,0], 40: [0,1] };
            if (map[keyCode]) changeDir(...map[keyCode]);
        }

        // ── Touch / Swipe ─────────────────────────────────────────────
        let touchX, touchY;
        canvas.addEventListener("touchstart", (e) => {
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener("touchend", (e) => {
            const dx = e.changedTouches[0].clientX - touchX;
            const dy = e.changedTouches[0].clientY - touchY;
            if (Math.abs(dx) > Math.abs(dy)) changeDir(dx > 0 ? 1 : -1, 0);
            else changeDir(0, dy > 0 ? 1 : -1);
            e.preventDefault();
        }, { passive: false });

        // ── Oyun adımı ────────────────────────────────────────────────
        function step() {
            if (isOver) return;
            dir = nextDir;

            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            // Duvar veya kendine çarpma
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
                snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.textContent = score;
                if (score > best) { best = score; bestEl.textContent = best; }
                placeFood();
            } else {
                snake.pop();
            }

            render();
        }

        // ── Oyun bitti ────────────────────────────────────────────────
        function endGame() {
            isOver = true;
            clearInterval(gameInterval);
            render();
            drawOverlay("OYUN BİTTİ  —  " + score + " puan", "Yeniden oynamak için butona bas");
            restartBtn.style.display = "block";
        }

        // ── Çizim ─────────────────────────────────────────────────────
        function render() {
            const W = canvas.width, H = canvas.height;

            // Arkaplan
            ctx.fillStyle = "rgba(8, 15, 30, 0.97)";
            ctx.fillRect(0, 0, W, H);

            // Izgara
            ctx.strokeStyle = "rgba(56, 189, 248, 0.06)";
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath(); ctx.moveTo(x * BOX, 0); ctx.lineTo(x * BOX, H); ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath(); ctx.moveTo(0, y * BOX); ctx.lineTo(W, y * BOX); ctx.stroke();
            }

            // Yılan
            snake.forEach((seg, i) => {
                const ratio = i / snake.length;
                if (i === 0) {
                    ctx.fillStyle = "#38bdf8";
                } else if (ratio < 0.35) {
                    ctx.fillStyle = "#0284c7";
                } else {
                    ctx.fillStyle = "#0369a1";
                }

                const pad = i === 0 ? 1 : 2;
                const r   = i === 0 ? 4 : 3;
                ctx.beginPath();
                ctx.roundRect(seg.x * BOX + pad, seg.y * BOX + pad, BOX - pad * 2, BOX - pad * 2, r);
                ctx.fill();

                // Göz
                if (i === 0) {
                    ctx.fillStyle = "#0f172a";
                    const horiz = dir.x !== 0;
                    const e1x = seg.x * BOX + (horiz ? (dir.x > 0 ? 13 : 4) : 5);
                    const e1y = seg.y * BOX + (horiz ? 5 : (dir.y > 0 ? 13 : 4));
                    const e2x = seg.x * BOX + (horiz ? (dir.x > 0 ? 13 : 4) : 13);
                    const e2y = seg.y * BOX + (horiz ? 13 : (dir.y > 0 ? 13 : 4));
                    ctx.beginPath(); ctx.arc(e1x, e1y, 2.2, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(e2x, e2y, 2.2, 0, Math.PI * 2); ctx.fill();
                }
            });

            // Besin (daire + parlak nokta)
            const fx = food.x * BOX + BOX / 2;
            const fy = food.y * BOX + BOX / 2;
            ctx.fillStyle = "#ef4444";
            ctx.beginPath(); ctx.arc(fx, fy, 7, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#fca5a5";
            ctx.beginPath(); ctx.arc(fx - 2.5, fy - 2.5, 2.5, 0, Math.PI * 2); ctx.fill();
        }

        // ── Overlay (başlangıç / bitiş) ───────────────────────────────
        function drawOverlay(line1, line2) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.62)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#f1f5f9";
            ctx.font = "700 17px 'Inter', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(line1, canvas.width / 2, canvas.height / 2 - 10);

            ctx.fillStyle = "rgba(203, 213, 225, 0.7)";
            ctx.font = "400 13px 'Inter', sans-serif";
            ctx.fillText(line2, canvas.width / 2, canvas.height / 2 + 16);

            ctx.textAlign = "left";
        }
    </script>

</body>
