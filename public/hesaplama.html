<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gano Hesapla | Adem Uçar</title>
    <link rel="icon" href="aucr.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Hesaplayıcıya Özel Stil Eklemeleri */
        .calculator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: #38bdf8;
            font-weight: 600;
        }

        input[type="number"], input[type="text"], select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #38bdf8;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Açılır menü (dropdown) listesi için karanlık tema */
        select option {
            background-color: #0f172a; 
            color: #f1f5f9; 
            padding: 10px;
        }

        .course-row {
            display: grid;
            grid-template-columns: 2fr 1fr auto 1fr 1fr auto;
            gap: 15px;
            align-items: end;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            height: 45px;
            gap: 8px;
            font-size: 0.85rem;
        }

        .btn-add {
            background: transparent;
            border: 1px dashed #38bdf8;
            color: #38bdf8;
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .btn-calc {
            background: #38bdf8;
            color: #0f172a;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .btn-remove {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .result-box {
            margin-top: 30px;
            padding: 25px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            text-align: center;
        }

        .result-score {
            font-size: 3.5rem;
            font-weight: 800;
            color: #38bdf8;
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .course-row { grid-template-columns: 1fr; }
            .calculator-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="background-wrapper">
        <header class="top-header">
            
            <!-- AÇILIR MENÜ EKLENMİŞ HALİ -->
            <nav class="nav-menu">
                <a href="/">ANA SAYFA</a>
                <a href="hakkimda">HAKKIMDA</a>
                <a href="projeler">PROJELER</a>

                <div class="dropdown">
                    <button class="dropbtn">ARAÇLAR</button>
                    <div class="dropdown-content">
                        <a href="calismaprogramıolusturucu"><i class="fas fa-calendar-alt"></i> Çalışma Programı Oluştur</a>
                        <a href="hesaplama"><i class="fas fa-calculator"></i> Gano Hesapla</a>
                        <a href="donemsayac"><i class="fas fa-hourglass-half"></i> Dönem Sayacı</a>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="dropbtn">OYUNLAR</button>
                    <div class="dropdown-content">
                        <a href="oyun"><i class="fas fa-gamepad"></i> Neon Snake</a>
                        <a href="flappy"><i class="fas fa-dove"></i> Neon Bird</a>
                        <a href="wordle"><i class="fas fa-font"></i> Neon Wordle</a>
                        <a href="tetris"><i class="fas fa-cubes"></i> Neon Tetris</a>
                        <a href="flagle"><i class="fas fa-flag"></i> Neon Flagle</a>
                        <a href="birkelimebirislem"><i class="fas fa-brain"></i> Bir Kelime Bir İşlem</a>
                    </div>
                </div>

                <a href="iletisim">İLETİŞİM</a>
            </nav>

            <div class="social-icons">
                <a href="https://www.instagram.com/ademucarr_/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.linkedin.com/in/adem-u%C3%A7ar-39501731a/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://github.com/ademucar" target="_blank"><i class="fab fa-github"></i></a>
            </div>
        </header>

        <div class="content-container">
            <h1 class="page-title">GANO HESAPLAYICI</h1>

            <div class="calculator-grid">
                <div class="input-group">
                    <label>Not Sistemi</label>
                    <select id="gradeSystem" onchange="updateAllGradeOptions()">
                        <option value="withFD">AA-FD-FF </option>
                        <option value="withoutFD">AA-FF </option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Mevcut Toplam AKTS</label>
                    <input type="number" id="currentCredits" value="0" min="0" oninput="this.value = Math.abs(this.value)">
                </div>
                <div class="input-group">
                    <label>Mevcut GANO</label>
                    <input type="number" id="currentGPA" value="0" min="0" max="4" step="0.01" oninput="if(this.value < 0) this.value = 0; if(this.value > 4) this.value = 4;">
                </div>
            </div>

            <div id="coursesContainer"></div>

            <button class="btn-add" onclick="addCourse()">+ Yeni Ders Ekle</button>
            <button class="btn-calc" onclick="calculateGPA()">Hesapla</button>

            <div class="result-box" id="resultBox" style="display: none;">
                <div style="font-size: 0.9rem; color: #cbd5e1;">Yeni Genel Not Ortalamanız</div>
                <div class="result-score" id="finalGPA">0.00</div>
                <div id="totalCreditsText" style="color: #38bdf8; font-weight: 600;"></div>
            </div>
        </div>
    </div>

    <script>
        const gradeSystems = {
            withFD: { "AA": 4.0, "BA": 3.5, "BB": 3.0, "CB": 2.5, "CC": 2.0, "DC": 1.5, "DD": 1.0, "FD": 0.5, "FF": 0.0 },
            withoutFD: { "AA": 4.0, "BA": 3.5, "BB": 3.0, "CB": 2.5, "CC": 2.0, "DC": 1.5, "DD": 1.0, "FF": 0.0 }
        };

        window.onload = () => { addCourse(); addCourse(); };

        function getGradeOptions() {
            const system = document.getElementById("gradeSystem").value;
            return Object.keys(gradeSystems[system]).map(grade => `<option value="${grade}">${grade}</option>`).join('');
        }

        function updateAllGradeOptions() {
            const selects = document.querySelectorAll('.grade-select');
            const options = getGradeOptions();
            selects.forEach(select => {
                const val = select.value;
                select.innerHTML = options;
                if([...select.options].some(opt => opt.value === val)) select.value = val;
            });
        }

        function addCourse() {
            const container = document.getElementById('coursesContainer');
            const id = Date.now() + Math.random();
            const options = getGradeOptions();
            const row = document.createElement('div');
            row.className = 'course-row';
            row.id = `course-${id}`;
            row.innerHTML = `
                <div class="input-group"><label>Ders Adı</label><input type="text" placeholder="Ders adı..." class="c-name"></div>
                <div class="input-group"><label>AKTS</label><input type="number" class="c-credits" value="0" min="0" oninput="this.value = Math.abs(this.value)"></div>
                <div class="checkbox-group"><input type="checkbox" id="retake-${id}" class="c-is-retake" onchange="toggleRetake('${id}')"><label for="retake-${id}">Alttan</label></div>
                <div id="oldGradeDiv-${id}" class="hidden input-group"><label>Eski Not</label><select class="grade-select c-old-grade">${options}</select></div>
                <div class="input-group"><label>Alınan Not</label><select class="grade-select c-new-grade">${options}</select></div>
                <button class="btn-remove" onclick="removeCourse('${id}')"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(row);
        }

        function toggleRetake(id) {
            document.getElementById(`oldGradeDiv-${id}`).classList.toggle('hidden', !document.getElementById(`retake-${id}`).checked);
        }

        function removeCourse(id) { document.getElementById(`course-${id}`).remove(); }

        function calculateGPA() {
            const gradesMap = gradeSystems[document.getElementById("gradeSystem").value];
            
            let totalCredits = Math.max(0, parseFloat(document.getElementById('currentCredits').value) || 0);
            let currentGPA = Math.max(0, parseFloat(document.getElementById('currentGPA').value) || 0);
            if(currentGPA > 4) currentGPA = 4;

            let totalQualityPoints = totalCredits * currentGPA;

            document.querySelectorAll('.course-row').forEach(row => {
                const credits = Math.max(0, parseFloat(row.querySelector('.c-credits').value) || 0);
                const isRetake = row.querySelector('.c-is-retake').checked;
                const newGradeVal = gradesMap[row.querySelector('.c-new-grade').value];
                
                if (credits > 0) {
                    if (isRetake) {
                        const oldGradeVal = gradesMap[row.querySelector('.c-old-grade').value];
                        totalQualityPoints += (credits * newGradeVal) - (credits * oldGradeVal);
                    } else {
                        totalCredits += credits;
                        totalQualityPoints += (credits * newGradeVal);
                    }
                }
            });

            document.getElementById('resultBox').style.display = "block";
            let final = totalCredits > 0 ? (totalQualityPoints / totalCredits) : 0;
            if(final < 0) final = 0;
            if(final > 4) final = 4;
            
            document.getElementById('finalGPA').innerText = final.toFixed(2);
            document.getElementById('totalCreditsText').innerText = `Toplam AKTS: ${totalCredits}`;
        }
    </script>
</body>
</html>
